<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Compras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Lista de Compras</h1>

        <form id="formulario">
            <input type="text" id="produto" placeholder="Digite um produto">
            <button type="submit">Adicionar</button>
        </form>

        <p id="mensagem"></p>

        <h3>Total de produtos: <span id="contador">0</span></h3>

        <button id="removerComprados">
            Remover Comprados
        </button>

        <ul id="lista"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
